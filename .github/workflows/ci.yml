name: Continuous Integration

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']
    tags: [v*]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build and Test
    strategy:
      matrix:
        os: [ubuntu-latest]
        java: [temurin@21, graal_graalvm-community@21]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java (temurin@21)
        if: matrix.java == 'temurin@21'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup GraalVM (graal_graalvm-community@21)
        if: matrix.java == 'graal_graalvm-community@21'
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: 21
          distribution: graalvm-community
          components: native-image
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Mill
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.mill
            out/
          key: mill-${{ matrix.os }}-${{ matrix.java }}-${{ hashFiles('build.mill') }}
          restore-keys: mill-${{ matrix.os }}-${{ matrix.java }}-

      - name: Build project
        run: ./mill __.compile

      - name: Run tests
        run: ./mill core.test

  publish:
    name: Publish Artifacts
    needs: [build]
    if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java (temurin@21)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Mill
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.mill
            out/
          key: mill-publish-${{ hashFiles('build.mill') }}
          restore-keys: mill-publish-

      - name: Publish project
        env:
          MILL_PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          MILL_PGP_SECRET_KEY: ${{ secrets.PGP_SECRET }}
          MILL_SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          MILL_SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        run: ./mill mill.scalalib.PublishModule/publishAll --publishArtifacts __.publishArtifacts --sonatypeUri https://s01.oss.sonatype.org/service/local --sonatypeSnapshotUri https://s01.oss.sonatype.org/content/repositories/snapshots
